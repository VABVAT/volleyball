# Kafka event enrichment pipeline — full stack
# Usage: from repo root: docker compose -f infra/docker-compose.yml up --build

services:
  zookeeper:
    image: bitnami/zookeeper:3.9.2
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/bitnami/zookeeper

  kafka:
    image: bitnami/kafka:3.7.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    volumes:
      - kafka_data:/bitnami/kafka

  kafka-init:
    image: bitnami/kafka:3.7.0
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Waiting for Kafka..."
        for i in $$(seq 1 60); do
          /opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 && break
          sleep 2
        done
        for topic in raw-events user-updates enriched-events retry-events dead-letter-queue; do
          /opt/bitnami/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic $$topic --partitions 3 --replication-factor 1
        done
        echo "Topics ready."

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"

  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  user-service:
    build:
      context: ..
      dockerfile: services/user_service/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql+asyncpg://pipeline:pipeline@postgres:5432/pipeline
      LOG_LEVEL: INFO
    ports:
      - "8080:8080"

  producer:
    build:
      context: ..
      dockerfile: services/producer/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_USE_AVRO: "1"
      OTLP_ENDPOINT: jaeger:4317
      PRODUCER_INTERVAL_SEC: "0.15"
      DUPLICATE_EVERY_N: "12"
      LOG_LEVEL: INFO

  stream-processor:
    build:
      context: ..
      dockerfile: services/consumer/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      redis:
        condition: service_started
      user-service:
        condition: service_started
      schema-registry:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      USER_SERVICE_URL: http://user-service:8080
      METRICS_PORT: "8002"
      USER_HTTP_RETRIES: "3"
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_USE_AVRO: "1"
      KAFKA_ENABLE_TXN: "1"
      OTLP_ENDPOINT: jaeger:4317
      LOG_LEVEL: INFO
    ports:
      - "8002:8002"

  retry-worker:
    build:
      context: ..
      dockerfile: services/retry_worker/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      redis:
        condition: service_started
      user-service:
        condition: service_started
      schema-registry:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      USER_SERVICE_URL: http://user-service:8080
      METRICS_PORT: "8004"
      MAX_RETRY_ATTEMPTS: "3"
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_USE_AVRO: "1"
      KAFKA_ENABLE_TXN: "1"
      OTLP_ENDPOINT: jaeger:4317
      LOG_LEVEL: INFO
    ports:
      - "8004:8004"

  dlq-handler:
    build:
      context: ..
      dockerfile: services/dlq_handler/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: "8005"
      DLQ_STORAGE_PATH: /data/dlq_store.jsonl
      OTLP_ENDPOINT: jaeger:4317
      LOG_LEVEL: INFO
    volumes:
      - dlq_data:/data
    ports:
      - "8005:8005"

  result-service:
    build:
      context: ..
      dockerfile: services/result_service/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      postgres:
        condition: service_started
      schema-registry:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql+asyncpg://pipeline:pipeline@postgres:5432/pipeline
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      METRICS_PORT: "8006"
      KAFKA_USE_AVRO: "1"
      LOG_LEVEL: INFO
    ports:
      - "8006:8006"

  dashboard:
    build:
      context: ..
      dockerfile: dashboard/Dockerfile
    depends_on:
      - stream-processor
      - retry-worker
      - dlq-handler
      - user-service
      - result-service
    environment:
      METRICS_STREAM_PROCESSOR: http://stream-processor:8002
      METRICS_RETRY_WORKER: http://retry-worker:8004
      METRICS_DLQ_HANDLER: http://dlq-handler:8005
      METRICS_USER_SERVICE: http://user-service:8080
      RESULT_SERVICE_URL: http://result-service:8006
    ports:
      - "8501:8501"

volumes:
  zookeeper_data:
  kafka_data:
  redis_data:
  dlq_data:
  postgres_data:
